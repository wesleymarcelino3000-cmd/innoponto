
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ponto InnoLife</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="glass glow card center">
      <img src="logo.webp" class="logo" alt="Logo">
      <h1>Ponto InnoLife</h1>
      <p>Versão empresa completa.</p>
      <div class="grid">
        <div><label>Usuário</label><input id="username" placeholder="Usuário"></div>
        <div><label>Senha</label><input id="password" type="password" placeholder="Senha"></div>
        <button onclick="login()">Entrar</button>
        <div class="small">Acesso inicial: admin / 1234</div>
        <div id="loginMsg" class="notice hidden"></div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
