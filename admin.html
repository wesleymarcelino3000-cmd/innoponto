
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <img src="logo.webp" class="logo" alt="Logo" style="max-width:120px;margin:0 0 10px 0">
        <h2>Painel Admin</h2>
        <span class="badge">Usuário: <strong id="currentUser"></strong></span>
      </div>
      <div class="toolbar">
        <button class="secondary" onclick="location.href='/painel.html'">Painel</button>
        <button class="danger" onclick="logout()">Sair</button>
      </div>
    </div>

    <div class="grid grid-3">
      <div class="glass glow kpi"><strong>Usuários</strong><br><span id="kpiUsers">0</span></div>
      <div class="glass glow kpi"><strong>Registros</strong><br><span id="kpiRecords">0</span></div>
      <div class="glass glow kpi"><strong>Meses fechados</strong><br><span id="kpiClosings">0</span></div>
    </div>

    <div class="grid grid-2" style="margin-top:18px">
      <div class="glass glow card">
        <h3>Configurações da empresa</h3>
        <div class="grid">
          <div><label>Nome da empresa</label><input id="companyName"></div>
          <div class="row">
            <div><label>Latitude</label><input id="companyLat" type="number" step="any"></div>
            <div><label>Longitude</label><input id="companyLng" type="number" step="any"></div>
          </div>
          <div class="row">
            <div><label>Raio permitido (m)</label><input id="radiusM" type="number"></div>
            <div><label>Jornada diária (horas)</label><input id="jornadaHours" type="number" step="0.5"></div>
          </div>
          <div><label>Tolerância atraso (minutos)</label><input id="toleranciaMin" type="number"></div>
          <button onclick="saveSettings()">Salvar configurações</button>
          <div id="settingsMsg" class="notice hidden"></div>
        </div>
      </div>

      <div class="glass glow card">
        <h3>Fechamento mensal</h3>
        <div class="grid">
          <div><label>Mês</label><input id="closeMonth" type="month"></div>
          <button onclick="closeMonth()">Fechar mês</button>
          <button class="success" onclick="exportExcel()">Exportar Excel</button>
          <div id="closingMsg" class="notice hidden"></div>
        </div>
      </div>
    </div>

    <div class="glass glow card" style="margin-top:18px">
      <h3>Criar usuário</h3>
      <div class="row">
        <div><label>Usuário</label><input id="newUsername"></div>
        <div><label>Senha</label><input id="newPassword"></div>
      </div>
      <div class="row" style="margin-top:12px">
        <div>
          <label>Perfil</label>
          <select id="newRole">
            <option value="employee">Funcionário</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div style="display:flex;align-items:end">
          <button onclick="createUser()">Criar</button>
        </div>
      </div>
      <div id="userMsg" class="notice hidden" style="margin-top:12px"></div>
    </div>

    <div class="glass glow card" style="margin-top:18px">
      <div class="panel-title">
        <h3>Usuários</h3>
        <span class="badge">Gerenciamento completo</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Usuário</th><th>Nova senha</th><th>Perfil</th><th>Status</th><th>Ações</th></tr>
          </thead>
          <tbody id="usersTable"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
