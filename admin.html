
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="topbar">
    <div>
      <h2>Painel Admin</h2>
      <span class="badge">Somente admin</span>
    </div>
    <div class="toolbar">
      <button class="secondary">Painel</button>
      <button class="danger">Sair</button>
    </div>
  </div>

  <div class="grid grid-2">
    <div class="glass glow card">
      <h3>Configurações</h3>
      <div class="row">
        <div><label>Jornada diária</label><input value="8"></div>
        <div><label>Tolerância</label><input value="10"></div>
      </div>
      <div style="margin-top:12px"><button>Salvar configurações</button></div>
    </div>

    <div class="glass glow card">
      <h3>Exportação</h3>
      <p>Excel profissional com abas e visual mais limpo.</p>
      <button class="success">Exportar Excel</button>
    </div>
  </div>

  <div class="glass glow card" style="margin-top:18px">
    <div class="panel-title">
      <h3>Usuários</h3>
      <span class="badge">Gestão rápida</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Usuário</th><th>Senha</th><th>Perfil</th><th>Ações</th></tr></thead>
        <tbody>
          <tr><td>admin</td><td>1234</td><td>admin</td><td><button style="width:auto">Salvar</button></td></tr>
          <tr><td>funcionario</td><td>1234</td><td>funcionario</td><td><button style="width:auto">Salvar</button></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
